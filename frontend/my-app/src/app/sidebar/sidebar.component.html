<div class="relative h-full">
  <div [ngClass]="{'w-64': isSidebarVisible, 'w-20': !isSidebarVisible}"
       class="h-full flex flex-col transition-all duration-500 border-r overflow-hidden"
       style="background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border-color: rgba(255,255,255,0.06);">

    <!-- Header -->
    <div class="flex items-center p-5" [ngClass]="{'justify-between': isSidebarVisible, 'justify-center': !isSidebarVisible}">
      <h2 *ngIf="isSidebarVisible" class="text-lg font-bold tracking-tight"
          style="background: linear-gradient(135deg, #f5f5f7, #86868b); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Voyagr
      </h2>
      <button (click)="toggleSidebar()"
              class="p-2.5 rounded-xl transition-all duration-300"
              style="color: var(--text-secondary);"
              onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#f5f5f7'"
              onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)'">
        <i class="fas fa-bars text-sm"></i>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-2">
      <ul class="space-y-1">
        <li>
          <a routerLink="/discover" routerLinkActive="nav-active"
             class="nav-item flex items-center rounded-xl transition-all duration-300"
             [ngClass]="{'px-4 py-3': isSidebarVisible, 'px-3 py-3 justify-center': !isSidebarVisible}"
             style="color: var(--text-secondary);">
            <i class="fas fa-compass" [ngClass]="{'text-lg': true, 'mr-3': isSidebarVisible}"></i>
            <span *ngIf="isSidebarVisible" class="text-sm font-medium">Discover</span>
          </a>
        </li>
        <li>
          <a routerLink="/view-lists" routerLinkActive="nav-active"
             class="nav-item flex items-center rounded-xl transition-all duration-300"
             [ngClass]="{'px-4 py-3': isSidebarVisible, 'px-3 py-3 justify-center': !isSidebarVisible}"
             style="color: var(--text-secondary);">
            <i class="fas fa-layer-group" [ngClass]="{'text-lg': true, 'mr-3': isSidebarVisible}"></i>
            <span *ngIf="isSidebarVisible" class="text-sm font-medium">Collections</span>
          </a>
        </li>
        <li>
          <a routerLink="/dashboard" routerLinkActive="nav-active"
             class="nav-item flex items-center rounded-xl transition-all duration-300"
             [ngClass]="{'px-4 py-3': isSidebarVisible, 'px-3 py-3 justify-center': !isSidebarVisible}"
             style="color: var(--text-secondary);">
            <i class="fas fa-house" [ngClass]="{'text-lg': true, 'mr-3': isSidebarVisible}"></i>
            <span *ngIf="isSidebarVisible" class="text-sm font-medium">Home</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</div>
