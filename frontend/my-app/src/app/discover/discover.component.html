<div class="flex flex-col md:flex-row h-screen mesh-gradient noise-overlay relative">
  <app-sidebar class="w-full md:w-auto"></app-sidebar>

  <div class="flex-1 overflow-y-auto p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="mb-8 animate-fade-in">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight" style="color: var(--text-primary);">
          Discover<span style="color: var(--accent-blue);">.</span>
        </h1>
        <p class="mt-2 text-lg" style="color: var(--text-secondary);">Find your next adventure</p>
      </div>

      <!-- Search -->
      <div class="glass-card p-6 mb-8 animate-fade-in stagger-1">
        <div class="flex flex-col sm:flex-row gap-3">
          <input #searchInput type="text"
                 placeholder="Search destinations... try 'beach vacation' or 'mountain adventure'"
                 class="input-glass flex-grow"
                 (keyup.enter)="searchDestinations(searchInput.value)">
          <button (click)="searchDestinations(searchInput.value)" class="btn-primary whitespace-nowrap flex items-center justify-center gap-2">
            <i class="fas fa-magnifying-glass text-sm"></i>
            <span>Search</span>
          </button>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="!isLoading && !destinationCards.length" class="text-center py-20 animate-fade-in stagger-2">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full mb-6"
             style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);">
          <i class="fas fa-earth-americas text-4xl" style="color: var(--text-tertiary);"></i>
        </div>
        <h3 class="text-xl font-semibold mb-2" style="color: var(--text-secondary);">Start exploring</h3>
        <p class="text-sm max-w-sm mx-auto" style="color: var(--text-tertiary);">Search for destinations and discover amazing places around the world.</p>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="glass-card p-5 mb-6 animate-fade-in" style="border: 1px solid rgba(255,59,48,0.3); background: rgba(255,59,48,0.08);">
        <div class="flex items-center gap-3">
          <i class="fas fa-circle-exclamation" style="color: #ff3b30;"></i>
          <p class="text-sm" style="color: var(--text-secondary);">{{ errorMessage }}</p>
        </div>
      </div>

      <!-- Loading -->
      <div *ngIf="isLoading" class="col-span-full flex flex-col justify-center items-center py-20">
        <div class="spinner mb-4"></div>
        <p class="text-sm" style="color: var(--text-secondary);">Finding destinations...</p>
      </div>

      <!-- Results Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        <div *ngFor="let card of destinationCards; let i = index"
             class="glass-card overflow-hidden animate-fade-in group"
             [class]="'glass-card overflow-hidden animate-fade-in group stagger-' + ((i % 6) + 1)">
          <!-- Image -->
          <div class="relative overflow-hidden" style="height: 200px;">
            <img [src]="card.image" [alt]="card.name"
                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
            <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);"></div>

            <!-- Like button -->
            <button (click)="toggleLike(card); $event.stopPropagation()"
                    class="absolute top-3 right-3 w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300"
                    style="background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);"
                    onmouseover="this.style.background='rgba(0,0,0,0.5)'"
                    onmouseout="this.style.background='rgba(0,0,0,0.3)'">
              <i class="fas fa-heart transition-all duration-300"
                 [ngClass]="{'text-red-500': card.isLiked, 'text-white/60': !card.isLiked}"
                 [style.transform]="card.isLiked ? 'scale(1.15)' : 'scale(1)'"></i>
            </button>
          </div>

          <!-- Content -->
          <div class="p-5">
            <h3 class="text-lg font-semibold tracking-tight mb-2" style="color: var(--text-primary);">{{card.name}}</h3>
            <p class="text-sm leading-relaxed line-clamp-3" style="color: var(--text-secondary);">{{card.description}}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
